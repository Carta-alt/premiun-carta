<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejemplo 4 | Carta Premium Multidioma</title>
  <meta name="description" content="Carta digital premium multidioma del restaurante Ejemplo 4" />
  <style>
    :root {
      --bg: #0f0f10;
      --bg-soft: #171719;
      --panel: rgba(255,255,255,0.06);
      --panel-2: rgba(255,255,255,0.09);
      --line: rgba(255,255,255,0.12);
      --gold: #d6b36a;
      --gold-2: #f3d18b;
      --text: #f5f1e8;
      --muted: #c8c0b2;
      --shadow: 0 18px 40px rgba(0,0,0,.35);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 1280px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(214,179,106,0.12), transparent 26%),
        radial-gradient(circle at bottom right, rgba(214,179,106,0.09), transparent 22%),
        linear-gradient(180deg, #0a0a0b 0%, #101012 100%);
      color: var(--text);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    button, select { font: inherit; }
    img { display: block; max-width: 100%; }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(10,10,11,.6);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 76px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(214,179,106,.45);
      background: linear-gradient(135deg, rgba(214,179,106,.24), rgba(214,179,106,.06));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 8px 22px rgba(214,179,106,.12);
      color: var(--gold-2);
      font-size: 18px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link {
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      border: 1px solid transparent;
      transition: .25s ease;
    }

    .nav-link:hover {
      color: var(--text);
      border-color: rgba(214,179,106,.28);
      background: rgba(255,255,255,.04);
    }

    .language-box {
      position: relative;
    }

    .language-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 190px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      cursor: pointer;
      transition: .25s ease;
    }

    .language-trigger:hover {
      border-color: rgba(214,179,106,.28);
      background: rgba(255,255,255,.08);
    }

    .language-trigger-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .language-caret {
      transition: transform .28s ease;
      color: var(--gold-2);
      font-size: .95rem;
    }

    .language-box.open .language-caret {
      transform: rotate(180deg);
    }

    .language-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 240px;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(214,179,106,.18);
      background: rgba(18,18,20,.94);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 40px rgba(0,0,0,.34);
      max-height: 0;
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      transition: max-height .35s ease, opacity .28s ease, transform .28s ease;
    }

    .language-box.open .language-menu {
      max-height: 420px;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .language-option {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: .22s ease;
      text-align: left;
    }

    .language-option:last-child {
      border-bottom: none;
    }

    .language-option:hover,
    .language-option.active {
      background: rgba(214,179,106,.10);
    }

    .language-option-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .language-flag {
      font-size: 1.15rem;
      line-height: 1;
    }

    .language-check {
      color: var(--gold-2);
      opacity: 0;
      transition: .2s ease;
    }

    .language-option.active .language-check {
      opacity: 1;
    }

    .hero {
      padding: 58px 0 24px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      border: 1px solid rgba(214,179,106,.18);
      box-shadow: var(--shadow);
      background:
        linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1600&q=80') center/cover;
      min-height: 520px;
      display: grid;
      align-items: end;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(8,8,9,.18) 0%, rgba(8,8,9,.78) 72%, rgba(8,8,9,.95) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: clamp(28px, 4vw, 48px);
      display: grid;
      gap: 18px;
      max-width: 780px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--gold-2);
      font-size: 13px;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(2.8rem, 6vw, 5.6rem);
      line-height: .96;
      letter-spacing: -0.04em;
    }

    .hero-text {
      margin: 0;
      color: #ece6da;
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      line-height: 1.7;
      max-width: 62ch;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 6px;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 14px 18px;
      border-radius: 999px;
      transition: transform .22s ease, box-shadow .22s ease, background .22s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      color: #181512;
    }

    .btn-secondary {
      background: rgba(255,255,255,.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.1);
    }

    .section {
      padding: 28px 0 54px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: clamp(1.8rem, 2.6vw, 2.5rem);
      line-height: 1.05;
      font-family: Georgia, 'Times New Roman', serif;
      letter-spacing: -0.03em;
    }

    .section-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 60ch;
      line-height: 1.7;
    }

    .category-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .category-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      color: var(--text);
      padding: 18px 18px;
      border-radius: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
      cursor: pointer;
      transition: .25s ease;
      text-align: left;
    }

    .category-btn:hover,
    .category-btn.active {
      border-color: rgba(214,179,106,.34);
      transform: translateY(-2px);
      background: linear-gradient(180deg, rgba(214,179,106,.18), rgba(255,255,255,.05));
    }

    .category-btn small {
      color: var(--muted);
      display: block;
      margin-top: 4px;
      font-size: .86rem;
    }

    .category-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      font-size: 20px;
      flex-shrink: 0;
    }

    .menu-layout {
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 24px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 94px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .sidebar-title {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .sidebar-text {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: .95rem;
    }

    .sidebar-list {
      display: grid;
      gap: 12px;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 16px;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.03);
      transition: .22s ease;
      cursor: pointer;
    }

    .sidebar-link:hover,
    .sidebar-link.active {
      border-color: rgba(214,179,106,.32);
      background: rgba(214,179,106,.10);
    }

    .sidebar-link span:last-child {
      color: var(--muted);
      font-size: .88rem;
    }

    .menu-panel {
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .menu-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .menu-top h3 {
      margin: 0;
      font-size: clamp(1.4rem, 2.4vw, 2rem);
      font-family: Georgia, 'Times New Roman', serif;
    }

    .menu-top p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .counter {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(214,179,106,.24);
      color: var(--gold-2);
      background: rgba(214,179,106,.08);
      font-weight: 700;
      white-space: nowrap;
    }

    .dish-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .dish-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      background: rgba(255,255,255,.04);
      transition: transform .26s ease, border-color .26s ease, box-shadow .26s ease;
      cursor: pointer;
    }

    .dish-card:hover {
      transform: translateY(-4px);
      border-color: rgba(214,179,106,.32);
      box-shadow: 0 18px 34px rgba(0,0,0,.22);
    }

    .dish-image-wrap {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }

    .dish-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .6s ease;
    }

    .dish-card:hover .dish-image {
      transform: scale(1.06);
    }

    .dish-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(15,15,16,.74);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--gold-2);
      font-size: .8rem;
      font-weight: 700;
    }

    .dish-content {
      padding: 16px 16px 18px;
      display: grid;
      gap: 10px;
    }

    .dish-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: start;
    }

    .dish-title {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.3;
    }

    .dish-price {
      color: var(--gold-2);
      font-weight: 800;
      white-space: nowrap;
      letter-spacing: .01em;
    }

    .dish-desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: .95rem;
    }

    .dish-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-top: 2px;
      color: var(--muted);
      font-size: .88rem;
    }

    .mini-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
    }

    .cta-banner {
      margin-top: 24px;
      padding: 20px;
      border-radius: 22px;
      border: 1px solid rgba(214,179,106,.16);
      background: linear-gradient(135deg, rgba(214,179,106,.14), rgba(255,255,255,.04));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .cta-banner h4 {
      margin: 0 0 6px;
      font-size: 1.15rem;
    }

    .cta-banner p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .footer {
      padding: 24px 0 44px;
      color: var(--muted);
    }

    .footer-card {
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      padding: 22px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .footer strong {
      color: var(--text);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 999;
    }

    .modal.open { display: flex; }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(10px);
    }

    .modal-card {
      position: relative;
      z-index: 2;
      width: min(980px, 100%);
      max-height: 90vh;
      overflow: auto;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, #171718, #0f0f10);
      box-shadow: 0 24px 80px rgba(0,0,0,.42);
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1.15fr 1fr;
    }

    .modal-media { min-height: 100%; background: #111; }

    .modal-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      min-height: 380px;
    }

    .modal-body {
      padding: 26px;
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .modal-title {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.2rem);
      line-height: 1.08;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .close-btn {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 14px;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 20px;
    }

    .modal-price {
      color: var(--gold-2);
      font-weight: 800;
      font-size: 1.06rem;
    }

    .modal-desc,
    .modal-meta {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .ingredients,
    .allergens {
      display: grid;
      gap: 10px;
    }

    .ingredients h4,
    .allergens h4 {
      margin: 0 0 2px;
      font-size: .98rem;
      color: var(--text);
      letter-spacing: .02em;
    }

    .ingredient-list,
    .allergen-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ingredient-chip,
    .allergen-chip {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: #efe7d7;
      font-size: .92rem;
    }

    .allergen-chip {
      background: rgba(214,179,106,.10);
      border-color: rgba(214,179,106,.16);
      color: var(--gold-2);
    }

    @media (max-width: 1024px) {
      .menu-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .modal-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .topbar-inner {
        min-height: auto;
        padding: 14px 0;
        align-items: start;
        flex-direction: column;
      }

      .topbar-right { width: 100%; justify-content: space-between; }
      .hero-card { min-height: 460px; }
      .menu-panel, .sidebar { padding: 18px; }
      .dish-grid { grid-template-columns: 1fr; }
      .category-bar { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 520px) {
      .container { width: min(calc(100% - 22px), var(--max)); }
      .hero { padding-top: 36px; }
      .hero-card { border-radius: 26px; }
      .category-bar { grid-template-columns: 1fr; }
      .modal-body { padding: 18px; }
      .language-box { width: 100%; justify-content: space-between; }
      .nav-links { width: 100%; justify-content: space-between; }
    }
  
    /* AJUSTE: quitar categorías duplicadas */
    .menu-layout { grid-template-columns: 1fr !important; }
    .sidebar { display: none !important; }

  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="#inicio" class="brand" aria-label="Ir al inicio">
        <div class="brand-mark">E4</div>
        <div><div>Ejemplo 4</div></div>
      </a>

      <div class="topbar-right">
        <nav class="nav-links" aria-label="Navegación principal">
          <a class="nav-link" href="#inicio" data-ui="navHome"></a>
          <a class="nav-link" href="#carta" data-ui="navMenu"></a>
          <a class="nav-link" href="#seleccion" data-ui="navSelection"></a>
          <a class="nav-link" href="#info" data-ui="navInfo"></a>
        </nav>

        <div class="language-box" id="languageDropdown">
          <button class="language-trigger" id="languageTrigger" type="button" aria-haspopup="true" aria-expanded="false">
            <span class="language-trigger-inner">
              <span class="language-flag" id="currentLanguageFlag">🇪🇸</span>
              <span id="currentLanguageName">Español</span>
            </span>
            <span class="language-caret">▾</span>
          </button>

          <div class="language-menu" id="languageMenu">
            <button class="language-option active" type="button" data-lang="es">
              <span class="language-option-left"><span class="language-flag">🇪🇸</span><span>Español</span></span>
              <span class="language-check">✓</span>
            </button>
            <button class="language-option" type="button" data-lang="en">
              <span class="language-option-left"><span class="language-flag">🇬🇧</span><span>English</span></span>
              <span class="language-check">✓</span>
            </button>
            <button class="language-option" type="button" data-lang="fr">
              <span class="language-option-left"><span class="language-flag">🇫🇷</span><span>Français</span></span>
              <span class="language-check">✓</span>
            </button>
            <button class="language-option" type="button" data-lang="de">
              <span class="language-option-left"><span class="language-flag">🇩🇪</span><span>Deutsch</span></span>
              <span class="language-check">✓</span>
            </button>
            <button class="language-option" type="button" data-lang="it">
              <span class="language-option-left"><span class="language-flag">🇮🇹</span><span>Italiano</span></span>
              <span class="language-check">✓</span>

    function translateUi() {
      document.documentElement.lang = currentLang;
      document.querySelectorAll('[data-ui]').forEach(el => {
        const key = el.dataset.ui;
        if (uiText[currentLang][key]) {
          el.textContent = uiText[currentLang][key];
        }
      });

      currentLanguageFlag.textContent = languageMeta[currentLang].flag;
      currentLanguageName.textContent = languageMeta[currentLang].name;
      languageTrigger.setAttribute('aria-label', `${uiText[currentLang].language}: ${languageMeta[currentLang].name}`);
      closeModal.setAttribute('aria-label', uiText[currentLang].closeAria);

      document.querySelectorAll('.language-option').forEach(option => {
        option.classList.toggle('active', option.dataset.lang === currentLang);
      });

      renderSidebar();
      renderCategories();
      renderDishes();
    }

            <small>${getText(category.short)}</small>
          </div>
          <div class="category-icon">${category.icon}</div>
        </button>
      `).join('');
      bindCategoryEvents();
    }

    function renderSidebar() {
      sidebarList.innerHTML = menuData.map(category => `
        <button class="sidebar-link ${category.id === activeCategory ? 'active' : ''}" data-category="${category.id}">
          <span>${category.icon} ${getText(category.name)}</span>
          <span>${category.items.length}</span>
        </button>
      `).join('');
      bindCategoryEvents();
    }

    function renderDishes() {
      const category = menuData.find(c => c.id === activeCategory);
      currentCategoryTitle.textContent = getText(category.name);
      currentCategoryText.textContent = getText(category.description);
      dishCounter.textContent = `${category.items.length} ${category.items.length === 1 ? uiText[currentLang].dishLabelSingle : uiText[currentLang].dishLabelPlural}`;

      dishGrid.innerHTML = category.items.map((item, index) => `
        <article class="dish-card" data-category="${category.id}" data-index="${index}" tabindex="0" aria-label="${getText(item.name)}">
          <div class="dish-image-wrap">
            <img class="dish-image" src="${item.image}" alt="${getText(item.name)}" loading="lazy" />
            <div class="dish-badge">${getText(item.badge)}</div>
          </div>
          <div class="dish-content">
            <div class="dish-row">
              <h4 class="dish-title">${getText(item.name)}</h4>
              <div class="dish-price">${item.price}</div>
            </div>
            <p class="dish-desc">${getText(item.description)}</p>
            <div class="dish-footer">
              <span class="mini-chip">${uiText[currentLang].viewIngredients}</span>
              <span>${getText(item.prep)}</span>
            </div>
          </div>
        </article>
      `).join('');
      bindDishEvents();
    }

    function setCategory(id) {
      activeCategory = id;
      renderCategories();
      renderSidebar();
      renderDishes();
    }

    function openDish(categoryId, itemIndex) {
      const category = menuData.find(c => c.id === categoryId);
      const item = category.items[itemIndex];
      modalImage.src = item.image;
      modalImage.alt = getText(item.name);
      modalPrice.textContent = item.price;
      modalTitle.textContent = getText(item.name);
      modalDescription.textContent = getText(item.description);
      modalMeta.textContent = `${getText(category.name)} · ${getText(item.prep)}`;

      modalIngredients.innerHTML = getArray(item.ingredients).map(ingredient => `
        <span class="ingredient-chip">${ingredient}</span>
      `).join('');

      modalAllergens.innerHTML = getArray(item.allergens).map(allergen => `
        <span class="allergen-chip">${allergen}</span>
      `).join('');

      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeDishModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function bindCategoryEvents() {
      document.querySelectorAll('[data-category]').forEach(el => {
        el.addEventListener('click', () => setCategory(el.dataset.category));
      });
    }

    function bindDishEvents() {
      document.querySelectorAll('.dish-card').forEach(card => {
        const handler = () => openDish(card.dataset.category, Number(card.dataset.index));
        card.addEventListener('click', handler);
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            handler();
          }
        });
      });
    }

    languageTrigger.addEventListener('click', () => {
      const isOpen = languageDropdown.classList.toggle('open');
      languageTrigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    document.querySelectorAll('.language-option').forEach(option => {
      option.addEventListener('click', () => {
        currentLang = option.dataset.lang;
        translateUi();
        languageDropdown.classList.remove('open');
        languageTrigger.setAttribute('aria-expanded', 'false');
      });
    });

    document.addEventListener('click', (e) => {
      if (!languageDropdown.contains(e.target)) {
        languageDropdown.classList.remove('open');
        languageTrigger.setAttribute('aria-expanded', 'false');
      }
    });

    document.getElementById('scrollToFeatured').addEventListener('click', () => {
      document.getElementById('seleccion').scrollIntoView({ behavior: 'smooth' });
    });

    closeModal.addEventListener('click', closeDishModal);
    modal.addEventListener('click', (e) => {
      if (e.target.dataset.close === 'true') closeDishModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('open')) closeDishModal();
    });

    translateUi();
  </script>
</body>
</html>
